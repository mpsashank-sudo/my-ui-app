<div style="text-align: center; margin-top: 100px; font-family: sans-serif;">
  <div style="border: 1px solid #ddd; display: inline-block; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h2 style="color: #333;">Welcome Back</h2>
    <input type="text" placeholder="Username" style="display: block; margin: 15px auto; padding: 10px; width: 200px;">
    <input type="password" placeholder="Password" style="display: block; margin: 15px auto; padding: 10px; width: 200px;">
    <button (click)="login()" style="padding: 10px 25px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
      Login
    </button>
  </div>
</div>
